; ESP32-S3 + INMP441 → WebSocket to AI-Toy backend
; Use a stable platform version to avoid "pins_arduino.h not found" (incomplete framework install)
[env:esp32-s3-devkitc-1]
platform = espressif32@6.4.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

lib_deps = 
    gilmaimon/ArduinoWebsockets@^0.5.4

build_flags = 
    -DCORE_DEBUG_LEVEL=1
