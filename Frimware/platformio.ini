[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_flags =
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DARDUINO_USB_MODE=1
  ; PubSubClient default 256B is too small for JSON + especially /wav payloads from backend
  ; PubSubClient buffer size is uint16_t — max 65535 (65536 wraps to 0).
  -D MQTT_MAX_PACKET_SIZE=65535
lib_deps =
  adafruit/Adafruit NeoPixel@^1.12.0
  knolleary/PubSubClient@^2.8
